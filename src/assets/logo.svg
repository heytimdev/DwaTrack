<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="44" height="44" aria-label="DwaTrack logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="44" height="44" rx="10" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="44" height="22" rx="10" fill="url(#shine)"/>

  <!-- Bold D — primary brand letter -->
  <text
    x="5" y="31"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="27"
    font-weight="900"
    fill="white"
    letter-spacing="-1"
  >D</text>

  <!-- Ascending bar chart — represents Track / business growth -->
  <rect x="26" y="23" width="4" height="8"  rx="1.5" fill="rgba(52,211,153,0.40)"/>
  <rect x="32" y="19" width="4" height="12" rx="1.5" fill="rgba(52,211,153,0.68)"/>
  <rect x="38" y="15" width="4" height="16" rx="1.5" fill="#34d399"/>
</svg>
